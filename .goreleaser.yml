version: 2

project_name: burn

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/burn
    binary: burn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^build\\(deps\\):"

homebrew_casks:
  - repository:
      owner: tanrikuluozlem
      name: homebrew-burn
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/tanrikuluozlem/burn
    description: Kubernetes FinOps CLI — analyze costs, find waste, get AI recommendations

release:
  github:
    owner: tanrikuluozlem
    name: burn
