apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "burn.fullname" . }}
  labels:
    {{- include "burn.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "burn.selectorLabels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ include "burn.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: {{ .Chart.Name }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                - report
                {{- if .Values.report.includeAI }}
                - --ai
                {{- end }}
              env:
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secrets.existingSecret }}
                      key: {{ .Values.secrets.slackWebhookKey }}
                {{- if .Values.report.includeAI }}
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secrets.existingSecret }}
                      key: {{ .Values.secrets.anthropicApiKey }}
                {{- end }}
                {{- if .Values.prometheus.url }}
                - name: PROMETHEUS_URL
                  value: {{ .Values.prometheus.url | quote }}
                {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
