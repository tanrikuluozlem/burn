image:
  repository: ghcr.io/tanrikuluozlem/burn
  tag: v0.2.7
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

schedule: "0 9 * * *"

report:
  includeAI: true

prometheus:
  url: "http://prometheus-kube-prometheus-prometheus.monitoring:9090"

secrets:
  existingSecret: "burn-secrets"
  slackWebhookKey: "slack-webhook-url"
  anthropicApiKey: "anthropic-api-key"

